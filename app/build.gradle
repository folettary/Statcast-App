plugins { id 'com.android.application' }

android {
    namespace 'com.folettary.statcastcompare'
    compileSdk 35

    defaultConfig {
        applicationId 'com.folettary.statcastcompare'
        minSdk 24
        targetSdk 35
        versionCode 461
        versionName '461.0.0'
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }
}
