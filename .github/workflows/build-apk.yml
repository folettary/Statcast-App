name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Apply Statcast app v41 phone-fix files
        shell: bash
        run: |
          set -euo pipefail
          ZIP="statcast-v41-phone-fix.zip"
          echo "Found $ZIP. Applying v41 files before build..."
          test -f "$ZIP"
          rm -rf /tmp/statcast-phone-fix
          mkdir -p /tmp/statcast-phone-fix
          unzip -o "$ZIP" -d /tmp/statcast-phone-fix
          find /tmp/statcast-phone-fix -maxdepth 6 -type f -print

          if [ -f "/tmp/statcast-phone-fix/MainActivity.java" ]; then
            cp /tmp/statcast-phone-fix/MainActivity.java app/src/main/java/com/folettary/statcastcompare/MainActivity.java
          elif [ -f "/tmp/statcast-phone-fix/app/src/main/java/com/folettary/statcastcompare/MainActivity.java" ]; then
            cp /tmp/statcast-phone-fix/app/src/main/java/com/folettary/statcastcompare/MainActivity.java app/src/main/java/com/folettary/statcastcompare/MainActivity.java
          else
            echo "MainActivity.java not found inside $ZIP"
            exit 1
          fi

          if [ -f "/tmp/statcast-phone-fix/build.gradle" ]; then
            cp /tmp/statcast-phone-fix/build.gradle app/build.gradle
          elif [ -f "/tmp/statcast-phone-fix/app/build.gradle" ]; then
            cp /tmp/statcast-phone-fix/app/build.gradle app/build.gradle
          else
            echo "build.gradle not found inside $ZIP"
            exit 1
          fi

          echo "Version marker:"
          grep -n "versionName" app/build.gradle || true
          echo "UI/code markers:"
          grep -n "v41" app/src/main/java/com/folettary/statcastcompare/MainActivity.java | head || true
          grep -n "ComparisonBarView" app/src/main/java/com/folettary/statcastcompare/MainActivity.java | head || true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StatcastCompare-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
