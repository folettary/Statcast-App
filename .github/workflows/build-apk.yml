name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Apply v5 phone update
        run: |
          if [ -f statcast-v5-phone-fix.zip ]; then
            echo "Found statcast-v5-phone-fix.zip. Applying v5 files before build..."
            unzip -o statcast-v5-phone-fix.zip -d /tmp/statcast-v5
            cp /tmp/statcast-v5/MainActivity.java app/src/main/java/com/folettary/statcastcompare/MainActivity.java
            cp /tmp/statcast-v5/build.gradle app/build.gradle
          else
            echo "statcast-v5-phone-fix.zip not found. Upload it to the repository root before building."
            exit 1
          fi

      - name: Verify v5 markers
        run: |
          grep -n "v5" app/src/main/java/com/folettary/statcastcompare/MainActivity.java
          grep -n "Explore" app/src/main/java/com/folettary/statcastcompare/MainActivity.java
          grep -n "insightTile" app/src/main/java/com/folettary/statcastcompare/MainActivity.java
          grep -n "versionName '5.0.0'" app/build.gradle

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StatcastCompare-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
